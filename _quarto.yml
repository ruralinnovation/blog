project:
  type: website
  output-dir: _site
  render:
    - "posts/**/*.qmd"

website:
  title: "Rural Dataverse"
  description: "Center on Rural Innovation - Mapping & Data Analytics"
  favicon: assets/images/Logo-Mark_Black.png
  open-graph: true
  google-analytics: "G-07QRVQQ5JK"

  navbar:
    logo: assets/images/CORI_Logo_Cream.svg
    logo-href: /
    left:
      - text: "Home"
        href: index.qmd
      - text: "Datasets"
        href: datasets.qmd
      - text: "R Packages"
        href: packages.qmd
      - text: "Projects"
        href: projects.qmd
      - text: "Blog"
        href: blog.qmd
      - text: "Resources"
        href: resources.qmd
    right:
      - text: "About"
        href: about.qmd
      - icon: github
        href: https://github.com/ruralinnovation

format:
  html:
    theme:
      - minty
      - src/custom.scss
    css: assets/fonts.css
    fontcolor: "#121E22"
    linkcolor: "#00835D"
    mainfont: "Bitter"
    grid:
      sidebar-width: 250px
      body-width: 1100px
      margin-width: 250px
    toc: true

# Content organization
contents:
  blog:
    path: "posts/blog"
    type: blog
  datasets:
    path: "posts/datasets"
    type: catalog
  packages:
    path: "posts/packages"
    type: catalog
  projects:
    path: "posts/projects"
    type: portfolio
  resources:
    path: "posts/resources"
    type: catalog

execute:
  freeze: auto
  echo: true
  warning: false
  message: false
