# Site settings
title: "Rural Dataverse"
short_title: "Rural Dataverse"
tagline: "Center on Rural Innovation - Mapping & Data Analytics"
description: >-
  Your hub for rural innovation data, tools, research, and analysis.
  Explore datasets, R packages, projects, and blog posts from the CORI MDA team.

# URLs
baseurl: "" # Empty for local development and custom domain
url: "http://localhost:4000" # Local development URL
repository: "https://github.com/ruralinnovation/blog"

# Organization
organization: "Center on Rural Innovation"
org_short: "CORI"

# Analytics
google_analytics: "G-07QRVQQ5JK"

# Build settings
markdown: kramdown
highlighter: rouge
destination: docs

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Note: Collections now managed by Quarto
# All content (datasets, packages, projects, blog, resources) lives in posts/ as Quarto files
# Quarto renders to _site/, then Jekyll can optionally post-process if needed

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Navigation
nav:
  - title: Home
    url: /
  - title: Datasets
    url: /datasets/
  - title: R Packages
    url: /packages/
  - title: Projects
    url: /projects/
  - title: Blog
    url: /stories/
  - title: Resources
    url: /resources/
  - title: About
    url: /about/

# Footer navigation
footer_nav:
  - title: GitHub
    url: https://github.com/ruralinnovation
  - title: CORI Website
    url: https://ruralinnovation.us
  - title: Contact
    url: /contact/

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - node_modules
  - vendor
  - .bundle
  - README.md
  - blog-mda.Rproj
  - "*.qmd"
  - _freeze
  - ideation docs

# Include
include:
  - _stories
